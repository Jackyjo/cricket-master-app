<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #0b0f19; --card: #161d2f; --accent: #00d2ff; --gold: #facc15; --text: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; overflow-x: auto; }
        .dashboard { display: flex; gap: 15px; padding: 20px; min-width: 1500px; height: 95vh; box-sizing: border-box; }
        .column { width: 280px; background: var(--card); border-radius: 12px; border: 1px solid #2d3748; display: flex; flex-direction: column; flex-shrink: 0; }
        .col-header { background: #1e293b; padding: 12px; text-align: center; border-bottom: 2px solid var(--accent); color: var(--gold); font-weight: bold; border-radius: 12px 12px 0 0; font-size: 13px; }
        .col-content { padding: 12px; overflow-y: auto; flex-grow: 1; white-space: normal; }
        .card-inner { background: #0f172a; padding: 10px; border-radius: 8px; margin-bottom: 10px; border-left: 3px solid var(--accent); font-size: 12px; }
        .team-box { background: #1a2236; border-left: 3px solid var(--gold); padding: 8px; margin-bottom: 8px; border-radius: 4px; font-size: 11px; }
        .playing-xi { border-left-color: #00ff00; }
        ::-webkit-scrollbar { height: 8px; }
        ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }
    </style>
</head>
<body>

<div class="dashboard">
    
    <!-- Col 1: Match Schedule -->
    <div class="column">
        <div class="col-header">1. MATCH DETAILS</div>
        <div class="col-content">
            <div class="card-inner">
                <b id="match-day">UPCOMING MATCH</b><br>
                <span id="teams-playing">KKR vs MI</span><br>
                <p>🕒 07:30 PM | IPL 2026</p>
            </div>
        </div>
    </div>

    <!-- Col 2: Toss & Pitch -->
    <div class="column">
        <div class="col-header">2. TOSS & PITCH</div>
        <div class="col-content" id="toss-pitch">
            <div class="card-inner">Fetching live toss...</div>
        </div>
    </div>

    <!-- Col 3: Previous Squad (Aapka Master Data) -->
    <div class="column">
        <div class="col-header">3. PREVIOUS SQUAD</div>
        <div class="col-content" id="prev-squad"></div>
    </div>

    <!-- Col 4: Final Lineup (Toss + 5 Min) -->
    <div class="column">
        <div class="col-header" style="color:#00ff00;">4. FINAL PLAYING XI</div>
        <div class="col-content" id="lineup">Waiting for lineup...</div>
    </div>

    <!-- Col 5: 10 GL Expert Teams -->
    <div class="column">
        <div class="col-header">5. 10 MEGA GL TEAMS</div>
        <div class="col-content" id="gl-teams"></div>
    </div>

</div>

<script>
    let tg = window.Telegram.WebApp; tg.expand();

    // Fixing players as per your shared list[span_3](start_span)[span_3](end_span)
    const squads = {
        "KKR": ["Rinku Singh", "Cameron Green", "Sunil Narine", "Harshit Rana", "Russell", "Varun C", "Vaibhav Arora"],
        "MI": ["Hardik Pandya", "Rohit Sharma", "Jasprit Bumrah", "Suryakumar Yadav", "Mitchell Starc", "Tilak Varma"]
    };

    function loadMatchData() {
        const teamA = "KKR";
        const teamB = "MI";

        // Col 2: Simulated Toss
        document.getElementById('toss-pitch').innerHTML = `<div class="card-inner"><b>Toss:</b> ${teamA} won and elected to Bat.<br><br><b>Pitch:</b> High scoring ground.</div>`;

        // Col 3: Showing all players from your list[span_4](start_span)[span_4](end_span)
        const allPlayers = [...squads[teamA], ...squads[teamB]];
        document.getElementById('prev-squad').innerHTML = allPlayers.map(p => `<div class="card-inner">${p}</div>`).join("");

        // Col 4: Lineup filter (only confirmed 11-11)
        const playingXI = [...squads[teamA].slice(0,6), ...squads[teamB].slice(0,5)];
        document.getElementById('lineup').innerHTML = playingXI.map(p => `<div class="card-inner playing-xi">✅ ${p}</div>`).join("");

        // Col 5: 10 GL Teams based on Lineup
        const glContainer = document.getElementById('gl-teams');
        glContainer.innerHTML = "";
        for(let i=1; i<=10; i++) {
            let shuf = [...playingXI].sort(() => 0.5 - Math.random());
            glContainer.innerHTML += `<div class="team-box"><b>TEAM #${i}</b><br><span style="color:var(--gold)">C: ${shuf[0]} | VC: ${shuf[1]}</span></div>`;
        }
    }

    loadMatchData();
</script>
</body>
</html>
