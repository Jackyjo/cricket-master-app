<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #0b0f19; --card: #161d2f; --accent: #00d2ff; --gold: #facc15; --text: #e2e8f0; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; }
        .header { background: #1e293b; padding: 15px; text-align: center; border-bottom: 2px solid var(--accent); }
        .tabs { display: flex; background: #1e293b; position: sticky; top: 0; z-index: 10; }
        .tab { flex: 1; padding: 12px; text-align: center; font-size: 13px; cursor: pointer; color: #94a3b8; }
        .active-tab { color: var(--accent); border-bottom: 3px solid var(--accent); background: rgba(0,210,255,0.1); }
        .content { padding: 15px; display: none; }
        .active-content { display: block; }
        .card { background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 12px; border: 1px solid #2d3748; }
        .team-card { border-left: 4px solid var(--gold); background: #1a2236; padding: 10px; margin-bottom: 10px; border-radius: 5px; }
        .c-vc { color: var(--gold); font-size: 12px; font-weight: bold; margin-bottom: 5px; }
    </style>
</head>
<body>

<div class="header">
    <h3 style="margin:0;">🏏 AUTO-EXPERT PRO</h3>
    <span id="live-indicator" style="font-size:10px; color:#00ff00;">● LIVE DATA ACTIVE</span>
</div>

<div class="tabs">
    <div class="tab active-tab" onclick="openTab(event, 'live')">LIVE SCORE</div>
    <div class="tab" onclick="openTab(event, 'gl')">10 GL TEAMS</div>
</div>

<div id="live" class="content active-content">
    <div class="card" id="score-container">
        <p style="text-align:center;">Fetching Live Data from Google/ESPN...</p>
        <iframe src="https://www.scorebat.com/embed/livescore/" style="width:100%; height:300px; border:none; filter: invert(1) hue-rotate(180deg);"></iframe>
    </div>
</div>

<div id="gl" class="content">
    <h4 style="color:var(--gold);">🏆 AI Generated GL Combinations</h4>
    <div id="teams-list">
        </div>
</div>

<script>
    let tg = window.Telegram.WebApp;
    tg.expand();

    function openTab(evt, tabName) {
        var i, content, tabs;
        content = document.getElementsByClassName("content");
        for (i = 0; i < content.length; i++) { content[i].style.display = "none"; }
        tabs = document.getElementsByClassName("tab");
        for (i = 0; i < tabs.length; i++) { tabs[i].className = tabs[i].className.replace(" active-tab", ""); }
        document.getElementById(tabName).style.display = "block";
        evt.currentTarget.className += " active-tab";
        if(tabName === 'gl') generateTeams();
    }

    function generateTeams() {
        const container = document.getElementById('teams-list');
        container.innerHTML = "";
        
        // Sample player pool - Ye logic real matches se names match kar sakta hai
        const players = ["Virat Kohli", "Suryakumar Yadav", "Rashid Khan", "Hardik Pandya", "Jasprit Bumrah", "Ishan Kishan", "Shubman Gill", "Rishabh Pant", "Klaasen", "Cummins", "Arshdeep Singh"];
        
        for (let i = 1; i <= 10; i++) {
            let shuffled = players.sort(() => 0.5 - Math.random());
            let team = shuffled.slice(0, 8); // Picking 8 random from pool
            let div = document.createElement('div');
            div.className = 'team-card';
            div.innerHTML = `
                <div class="team-title" style="font-weight:bold; color:#00d2ff;">COMBINATION #${i}</div>
                <div class="c-vc">👑 C: \${team[0]} | 💠 VC: \${team[1]}</div>
                <div style="font-size:11px; color:#94a3b8;">Squad: \${team.join(', ')}</div>
            `;
            container.appendChild(div);
        }
    }

    // Initial Load
    generateTeams();
</script>

</body>
</html>
