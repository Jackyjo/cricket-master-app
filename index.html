<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #0b0f19; --card: #1e293b; --accent: #00d2ff; --gold: #facc15; --text: #f8fafc; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; }
        .header { background: #161d2f; padding: 15px; text-align: center; border-bottom: 2px solid var(--accent); }
        .tabs { display: flex; background: #161d2f; position: sticky; top: 0; z-index: 10; }
        .tab { flex: 1; padding: 12px; text-align: center; font-size: 14px; cursor: pointer; color: #94a3b8; }
        .active-tab { color: var(--accent); border-bottom: 2px solid var(--accent); background: rgba(0,210,255,0.05); }
        .content { padding: 15px; display: none; }
        .active-content { display: block; }
        .team-box { background: #0f172a; padding: 12px; border-radius: 8px; margin-bottom: 12px; border-left: 4px solid var(--gold); }
        .c-vc { font-weight: bold; color: var(--gold); margin-bottom: 5px; font-size: 14px; }
        .players { font-size: 12px; color: #cbd5e1; }
    </style>
</head>
<body>

<div class="header">
    <h3 style="margin:0; color: var(--gold);">🏏 CRICKET EXPERT PRO</h3>
    <div id="timer" style="font-size:10px; color:#00ff00; margin-top:5px;">Refreshing teams...</div>
</div>

<div class="tabs">
    <div class="tab active-tab" onclick="showTab('score')">LIVE SCORE</div>
    <div class="tab" onclick="showTab('teams')">10 GL TEAMS</div>
</div>

<div id="score" class="content active-content">
    <iframe src="https://m.cricbuzz.com/cricket-match-results" style="width:100%; height:500px; border:none; border-radius:10px;"></iframe>
</div>

<div id="teams" class="content">
    <div id="gl-container"></div>
</div>

<script>
    let tg = window.Telegram.WebApp;
    tg.expand();

    function showTab(name) {
        document.querySelectorAll('.content').forEach(c => c.style.display = 'none');
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active-tab'));
        document.getElementById(name).style.display = 'block';
        event.currentTarget.classList.add('active-tab');
        if(name === 'teams') renderTeams();
    }

    function renderTeams() {
        const container = document.getElementById('gl-container');
        container.innerHTML = "";
        const players = ["Virat Kohli", "Shubman Gill", "Rashid Khan", "Hardik Pandya", "Suryakumar Yadav", "Jasprit Bumrah", "Travis Head", "Ishan Kishan", "Pat Cummins", "Rishabh Pant", "Arshdeep Singh", "Sanju Samson"];

        for (let i = 1; i <= 10; i++) {
            let shuffled = players.sort(() => 0.5 - Math.random());
            let team = shuffled.slice(0, 11);
            let div = document.createElement('div');
            div.className = 'team-box';
            // Fixed String logic for GitHub
            div.innerHTML = '<div style="font-size:11px; color:#00d2ff; margin-bottom:5px;">COMBINATION #' + i + '</div>' +
                            '<div class="c-vc">👑 C: ' + team[0] + ' | 💠 VC: ' + team[1] + '</div>' +
                            '<div class="players"><b>Squad:</b> ' + team.join(', ') + '</div>';
            container.appendChild(div);
        }
        document.getElementById('timer').innerText = "● Teams Updated: " + new Date().toLocaleTimeString();
    }

    // Har 60 second mein teams apne aap badlengi
    setInterval(renderTeams, 60000);
    renderTeams();
</script>

</body>
</html>
