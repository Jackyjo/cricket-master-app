<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #0b0f19; --card: #161d2f; --accent: #00d2ff; --gold: #facc15; --text: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; overflow-x: auto; }
        .dashboard { display: flex; gap: 12px; padding: 20px; min-width: 1600px; height: 95vh; box-sizing: border-box; }
        .column { width: 300px; background: var(--card); border-radius: 12px; border: 1px solid #2d3748; display: flex; flex-direction: column; flex-shrink: 0; }
        .col-header { background: #1e293b; padding: 12px; text-align: center; border-bottom: 2px solid var(--accent); color: var(--gold); font-weight: bold; font-size: 13px; }
        .col-content { padding: 12px; overflow-y: auto; flex-grow: 1; white-space: normal; }
        .card-inner { background: #0f172a; padding: 10px; border-radius: 8px; margin-bottom: 10px; border-left: 3px solid var(--accent); font-size: 12px; }
        .prev-item { border-left-color: #10b981; background: rgba(16, 185, 129, 0.05); }
        .team-box { background: #1a2236; border-left: 3px solid var(--gold); padding: 8px; margin-bottom: 8px; border-radius: 4px; font-size: 11px; }
        ::-webkit-scrollbar { height: 8px; }
        ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }
    </style>
</head>
<body>

<div class="dashboard">
    <div class="column">
        <div class="col-header">1. MATCH INFO</div>
        <div class="col-content" id="col-1"></div>
    </div>
    <div class="column">
        <div class="col-header">2. PITCH REPORT</div>
        <div class="col-content">
            <div class="card-inner">📍 Raipur<br><b>Report:</b> Slow track. Spinners like Narine and Krunal will be effective here[span_3](start_span)[span_3](end_span).</div>
        </div>
    </div>
    <div class="column">
        <div class="col-header">3. PREVIOUS MATCH PLAYERS</div>
        <div class="col-content" id="col-3"></div>
    </div>
    <div class="column">
        <div class="col-header" style="color:var(--accent);">4. LIVE TOSS DETAILS</div>
        <div class="col-content" id="col-4">
            <div class="card-inner" style="text-align:center;"><b>TOSS STATUS:</b><br>Updating 30 mins before match.</div>
        </div>
    </div>
    <div class="column">
        <div class="col-header" style="color:#10b981;">5. LINEUP & 10 GL TEAMS</div>
        <div class="col-content" id="col-5"></div>
    </div>
</div>

<script>
    // Strictly using your provided data[span_4](start_span)[span_4](end_span)
    const squads = {
        "RCB": ["Virat Kohli", "Josh Hazlewood", "Rajat Patidar", "Jitesh Sharma", "Bhuvi", "Krunal Pandya", "Yash Dayal", "Anuj Rawat", "Swapnil Singh", "Maxwell", "Siraj"],
        "KKR": ["Rinku Singh", "Cameron Green", "Sunil Narine", "Ramandeep Singh", "Vaibhav Arora", "Varun C", "Anukul Roy", "Venkatesh Iyer", "Phil Salt", "Gurbaz", "Manish Pandey"]
    };

    function loadDashboard() {
        const t1 = "RCB", t2 = "KKR";
        document.getElementById('col-1').innerHTML = `<div class="card-inner"><b>TONIGHT: ${t1} vs ${t2}</b><br>📅 13 May | 🕒 7:30 PM</div>`;

        // Column 3: Using your corrected squads[span_5](start_span)[span_5](end_span)
        document.getElementById('col-3').innerHTML = 
            `<b style="color:var(--accent)">${t1} Previous XI:</b>` + squads[t1].map(p => `<div class="card-inner prev-item">👤 ${p}</div>`).join("") +
            `<br><b style="color:var(--accent)">${t2} Previous XI:</b>` + squads[t2].map(p => `<div class="card-inner prev-item">👤 ${p}</div>`).join("");

        // Column 4: Toss Simulation[span_6](start_span)[span_6](end_span)
        const tossDone = true; 
        if(tossDone) {
            document.getElementById('col-4').innerHTML = `<div class="card-inner" style="border-left-color:var(--gold)"><b>TOSS:</b> ${t1} won & elected to BAT first.</div>`;
        }

        // Column 5: Showing all 22 players and 10 GL Teams[span_7](start_span)[span_7](end_span)
        const allPlayers = [...squads[t1], ...squads[t2]];
        let col5 = document.getElementById('col-5');
        col5.innerHTML = `<b style="color:#10b981">✅ Confirmed 22:</b>` + 
            allPlayers.map(p => `<div style="font-size:10px; margin:2px;">• ${p}</div>`).join("");
        
        for(let i=1; i<=10; i++) {
            let shuf = [...allPlayers].sort(() => 0.5 - Math.random());
            col5.innerHTML += `<div class="team-box"><b>MEGA GL #${i}</b><br>C: ${shuf[0]} | VC: ${shuf[1]}</div>`;
        }
    }
    loadDashboard();
</script>
</body>
</html>
