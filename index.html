<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #0b0f19; --card: #161d2f; --accent: #00d2ff; --gold: #facc15; --text: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; overflow-x: auto; }
        .dashboard { display: flex; gap: 12px; padding: 20px; min-width: 1600px; height: 95vh; box-sizing: border-box; }
        .column { width: 300px; background: var(--card); border-radius: 12px; border: 1px solid #2d3748; display: flex; flex-direction: column; flex-shrink: 0; }
        .col-header { background: #1e293b; padding: 12px; text-align: center; border-bottom: 2px solid var(--accent); color: var(--gold); font-weight: bold; font-size: 13px; }
        .col-content { padding: 12px; overflow-y: auto; flex-grow: 1; white-space: normal; }
        .card-inner { background: #0f172a; padding: 10px; border-radius: 8px; margin-bottom: 10px; border-left: 3px solid var(--accent); font-size: 12px; }
        .prev-item { border-left-color: #10b981; background: rgba(16, 185, 129, 0.05); }
        .team-box { background: #1a2236; border-left: 3px solid var(--gold); padding: 8px; margin-bottom: 8px; border-radius: 4px; font-size: 11px; }
        ::-webkit-scrollbar { height: 8px; }
        ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }
    </style>
</head>
<body>

<div class="dashboard" id="main-dashboard">
    <!-- Col 1: Match Details -->
    <div class="column">
        <div class="col-header">1. MATCH INFO</div>
        <div class="col-content" id="col-1"></div>
    </div>

    <!-- Col 2: Toss & Pitch -->
    <div class="column">
        <div class="col-header">2. TOSS & PITCH</div>
        <div class="col-content" id="col-2"></div>
    </div>

    <!-- Col 3: Master Squad Pool -->
    <div class="column">
        <div class="col-header">3. FULL SQUAD POOL</div>
        <div class="col-content" id="col-3"></div>
    </div>

    <!-- Col 4: Previous XI (Both Teams) -->
    <div class="column">
        <div class="col-header" style="color:#10b981;">4. PREVIOUS SQUAD (XI)</div>
        <div class="col-content" id="col-4"></div>
    </div>

    <!-- Col 5: 10 GL Teams -->
    <div class="column">
        <div class="col-header">5. 10 MEGA GL TEAMS</div>
        <div class="col-content" id="col-5"></div>
    </div>
</div>

<script>
    // Full Schedule & Master Database[span_4](start_span)[span_4](end_span)
    const schedule = [
        { date: "2026-05-13", t1: "RCB", t2: "KKR", venue: "Raipur" },
        { date: "2026-05-14", t1: "PBKS", t2: "MI", venue: "Dharamshala" },
        { date: "2026-05-15", t1: "CSK", t2: "SRH", venue: "Chennai" }
    ];

    const masterSquads = {
        "RCB": ["Virat Kohli", "Josh Hazlewood", "Rajat Patidar", "Jitesh Sharma", "Bhuvneshwar Kumar", "Krunal Pandya", "Yash Dayal", "Anuj Rawat"],
        "KKR": ["Rinku Singh", "Cameron Green", "Sunil Narine", "Harshit Rana", "Ramandeep Singh", "Vaibhav Arora", "Varun Chakaravarthy"],
        "MI": ["Hardik Pandya", "Rohit Sharma", "Jasprit Bumrah", "Suryakumar Yadav", "Mitchell Starc", "Tilak Varma"],
        "SRH": ["Pat Cummins", "Heinrich Klaasen", "Abhishek Sharma", "Travis Head", "Nitish Reddy", "Ishan Kishan", "Shahbaz Ahmed"]
    };

    function runLiveSync() {
        const today = new Date().toISOString().split('T')[0];
        const match = schedule.find(m => m.date === today) || schedule[0]; // Auto-pick today's match[span_5](start_span)[span_5](end_span)

        // Column 1: Info[span_6](start_span)[span_6](end_span)
        document.getElementById('col-1').innerHTML = `<div class="card-inner"><b>TONIGHT: ${match.t1} vs ${match.t2}</b><br>📅 ${match.date}<br>📍 ${match.venue}</div>`;

        // Column 2: Pitch[span_7](start_span)[span_7](end_span)
        document.getElementById('col-2').innerHTML = `<div class="card-inner"><b>Venue:</b> ${match.venue}<br><b>Report:</b> High scoring chances. Spinners key in middle overs.</div>`;

        // Column 3: Pool[span_8](start_span)[span_8](end_span)
        const pool = [...(masterSquads[match.t1] || []), ...(masterSquads[match.t2] || [])];
        document.getElementById('col-3').innerHTML = pool.map(p => `<div class="card-inner">${p}</div>`).join("");

        // Column 4: Both Teams Previous XI[span_9](start_span)[span_9](end_span)
        const t1XI = (masterSquads[match.t1] || []).slice(0, 11);
        const t2XI = (masterSquads[match.t2] || []).slice(0, 11);
        document.getElementById('col-4').innerHTML = 
            `<b style="color:var(--accent)">${match.t1} XI:</b>` + t1XI.map(p => `<div class="card-inner prev-item">👤 ${p}</div>`).join("") +
            `<br><b style="color:var(--accent)">${match.t2} XI:</b>` + t2XI.map(p => `<div class="card-inner prev-item">👤 ${p}</div>`).join("");

        // Column 5: Generate Teams[span_10](start_span)[span_10](end_span)
        generateGL([...t1XI, ...t2XI]);
    }

    function generateGL(players) {
        const glDiv = document.getElementById('col-5');
        glDiv.innerHTML = "";
        for(let i=1; i<=10; i++) {
            let shuf = [...players].sort(() => 0.5 - Math.random());
            glDiv.innerHTML += `<div class="team-box"><b>MEGA GL #${i}</b><br><span style="color:var(--gold)">C: ${shuf[0]} | VC: ${shuf[1]}</span></div>`;
        }
    }

    runLiveSync();
</script>
</body>
</html>
