<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #0b0f19; --card: #161d2f; --accent: #00d2ff; --gold: #facc15; --text: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; overflow-x: auto; }
        .dashboard { display: flex; gap: 12px; padding: 20px; min-width: 1600px; height: 95vh; box-sizing: border-box; }
        .column { width: 300px; background: var(--card); border-radius: 12px; border: 1px solid #2d3748; display: flex; flex-direction: column; flex-shrink: 0; }
        .col-header { background: #1e293b; padding: 12px; text-align: center; border-bottom: 2px solid var(--accent); color: var(--gold); font-weight: bold; font-size: 13px; }
        .col-content { padding: 12px; overflow-y: auto; flex-grow: 1; white-space: normal; }
        .card-inner { background: #0f172a; padding: 10px; border-radius: 8px; margin-bottom: 10px; border-left: 3px solid var(--accent); font-size: 12px; }
        .prev-item { border-left-color: #10b981; background: rgba(16, 185, 129, 0.05); }
        .team-box { background: #1a2236; border-left: 3px solid var(--gold); padding: 8px; margin-bottom: 8px; border-radius: 4px; font-size: 11px; }
        ::-webkit-scrollbar { height: 8px; }
        ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }
    </style>
</head>
<body>

<div class="dashboard">
    <!-- Column 1: Match Info -->
    <div class="column">
        <div class="col-header">1. MATCH INFO</div>
        <div class="col-content" id="col-1"></div>
    </div>

    <!-- Column 2: Pitch Report -->
    <div class="column">
        <div class="col-header">2. PITCH REPORT</div>
        <div class="col-content" id="col-2">
            <div class="card-inner"><b>Venue:</b> Raipur<br><b>Report:</b> Slow pitch. Spinners will be effective in the second innings.</div>
        </div>
    </div>

    <!-- Column 3: Previous Match Players (Both Teams) -->
    <div class="column">
        <div class="col-header">3. PREVIOUS MATCH PLAYERS</div>
        <div class="col-content" id="col-3"></div>
    </div>

    <!-- Column 4: LIVE TOSS DETAILS -->
    <div class="column">
        <div class="col-header" style="color:var(--accent);">4. TOSS DETAILS</div>
        <div class="col-content" id="col-4">
            <div class="card-inner" id="toss-status">Waiting for Toss (7:00 PM IST)...</div>
        </div>
    </div>

    <!-- Column 5: FINAL PLAYING XI & GL TEAMS -->
    <div class="column">
        <div class="col-header" style="color:#10b981;">5. LINEUP & 10 GL TEAMS</div>
        <div class="col-content" id="col-5">
            <p id="lineup-wait" style="text-align:center; margin-top:20px; font-size:11px; color:#94a3b8;">
                ⚠️ Teams generate honge Lineup confirm hone ke baad.
            </p>
        </div>
    </div>
</div>

<script>
    // Data based on IPL 2026 squads[span_2](start_span)[span_2](end_span)
    const matchData = {
        date: "13 May",
        t1: "RCB",
        t2: "KKR",
        // Previous match players (Harshit Rana excluded based on your correction)[span_3](start_span)[span_3](end_span)
        t1Prev: ["Virat Kohli", "Josh Hazlewood", "Rajat Patidar", "Jitesh Sharma", "Bhuvi", "Krunal Pandya", "Yash Dayal", "Anuj Rawat", "Swapnil Singh", "Maxwell", "Siraj"],
        t2Prev: ["Rinku Singh", "Cameron Green", "Sunil Narine", "Ramandeep Singh", "Vaibhav Arora", "Varun C", "Russell", "Anukul Roy", "Salt", "Gurbaz", "V. Iyer"]
    };

    function updateDashboard() {
        // Col 1: Match Info[span_4](start_span)[span_4](end_span)
        document.getElementById('col-1').innerHTML = `<div class="card-inner"><b>TONIGHT: ${matchData.t1} vs ${matchData.t2}</b><br>📅 ${matchData.date} | 📍 Raipur</div>`;

        // Col 3: Previous Match Players[span_5](start_span)[span_5](end_span)
        document.getElementById('col-3').innerHTML = 
            `<b style="color:var(--accent)">${matchData.t1} (Last Match):</b>` + matchData.t1Prev.map(p => `<div class="card-inner prev-item">👤 ${p}</div>`).join("") +
            `<br><b style="color:var(--accent)">${matchData.t2} (Last Match):</b>` + matchData.t2Prev.map(p => `<div class="card-inner prev-item">👤 ${p}</div>`).join("");

        // Simulation: 7:00 PM Toss & Lineup[span_6](start_span)[span_6](end_span)
        const isTossOut = true; 
        const isLineupOut = true;

        if(isTossOut) {
            document.getElementById('col-4').innerHTML = `<div class="card-inner" style="border-left-color:var(--gold)"><b>TOSS:</b> ${matchData.t1} won & elected to BAT.</div>`;
        }

        if(isLineupOut) {
            document.getElementById('lineup-wait').style.display = 'none';
            const finalPlayers = [...matchData.t1Prev, ...matchData.t2Prev];
            generateOutput(finalPlayers);
        }
    }

    function generateOutput(players) {
        const col5 = document.getElementById('col-5');
        col5.innerHTML = `<b style="color:#10b981">✅ Confirmed Playing 22:</b>` + 
            players.slice(0, 11).map(p => `<div style="font-size:10px; margin:2px;">• ${p}</div>`).join("");
        
        col5.innerHTML += `<br><b style="color:var(--gold)">🏆 10 Expert GL Teams:</b>`;
        for(let i=1; i<=10; i++) {
            let shuf = [...players].sort(() => 0.5 - Math.random());
            col5.innerHTML += `<div class="team-box"><b>TEAM #${i}</b><br>C: ${shuf[0]} | VC: ${shuf[1]}</div>`;
        }
    }

    updateDashboard();
</script>
</body>
</html>
