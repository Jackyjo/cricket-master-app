<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #0b0f19; --card: #161d2f; --accent: #00d2ff; --gold: #facc15; --text: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; overflow-x: auto; }
        .dashboard { display: flex; gap: 15px; padding: 20px; min-width: 1600px; height: 95vh; box-sizing: border-box; }
        .column { width: 300px; background: var(--card); border-radius: 12px; border: 1px solid #2d3748; display: flex; flex-direction: column; flex-shrink: 0; }
        .col-header { background: #1e293b; padding: 12px; text-align: center; border-bottom: 2px solid var(--accent); color: var(--gold); font-weight: bold; font-size: 13px; }
        .col-content { padding: 12px; overflow-y: auto; flex-grow: 1; white-space: normal; }
        .card-inner { background: #0f172a; padding: 10px; border-radius: 8px; margin-bottom: 10px; border-left: 3px solid var(--accent); font-size: 12px; }
        .live-xi { border-left-color: #10b981; background: rgba(16, 185, 129, 0.1); }
        .team-box { background: #1a2236; border-left: 3px solid var(--gold); padding: 10px; margin-bottom: 10px; border-radius: 6px; font-size: 11px; }
        ::-webkit-scrollbar { height: 8px; }
        ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }
    </style>
</head>
<body>

<div class="dashboard">
    <!-- Col 1: Match Info -->
    <div class="column">
        <div class="col-header">1. MATCH INFO</div>
        <div class="col-content" id="col-1"></div>
    </div>

    <!-- Col 2: Toss & Pitch -->
    <div class="column">
        <div class="col-header">2. TOSS & PITCH</div>
        <div class="col-content" id="col-2">
            <div class="card-inner"><b>Toss Update:</b><br>Will be updated 30 mins before match.</div>
        </div>
    </div>

    <!-- Col 3: Master Pool -->
    <div class="column">
        <div class="col-header">3. FULL SQUAD POOL</div>
        <div class="col-content" id="col-3"></div>
    </div>

    <!-- Col 4: Previous Match Playing XI -->
    <div class="column">
        <div class="col-header" style="color:var(--accent);">4. PREVIOUS PLAYING XI</div>
        <div class="col-content" id="col-4"></div>
    </div>

    <!-- Col 5: 10 GL Teams (Post-Lineup Only) -->
    <div class="column">
        <div class="col-header" style="color:#10b981;">5. 10 MEGA GL TEAMS</div>
        <div class="col-content" id="col-5">
            <p id="wait-msg" style="text-align:center; margin-top:20px; font-size:11px; color:#94a3b8;">
                ⚠️ Teams will be generated ONLY after Lineup is out.
            </p>
        </div>
    </div>
</div>

<script>
    // Master data from your provided squads[span_3](start_span)[span_3](end_span)
    const masterData = {
        "RCB": ["Virat Kohli", "Josh Hazlewood", "Rajat Patidar", "Jitesh Sharma", "Bhuvi", "Krunal Pandya", "Yash Dayal", "Anuj Rawat"],
        "KKR": ["Rinku Singh", "Cameron Green", "Sunil Narine", "Harshit Rana", "Ramandeep Singh", "Vaibhav Arora", "Varun C", "Russell"]
    };

    function loadData() {
        const t1 = "RCB";
        const t2 = "KKR";

        // Col 1: Info[span_4](start_span)[span_4](end_span)
        document.getElementById('col-1').innerHTML = `<div class="card-inner"><b>TONIGHT: ${t1} vs ${t2}</b><br>📍 Raipur | 🕒 07:30 PM</div>`;

        // Col 3: Pool[span_5](start_span)[span_5](end_span)
        const pool = [...masterData[t1], ...masterData[t2]];
        document.getElementById('col-3').innerHTML = pool.map(p => `<div class="card-inner">${p}</div>`).join("");

        // Col 4: Both Teams Previous Playing XI[span_6](start_span)[span_6](end_span)
        const t1XI = masterData[t1].slice(0, 11);
        const t2XI = masterData[t2].slice(0, 11);
        document.getElementById('col-4').innerHTML = 
            `<b style="color:var(--accent)">${t1} Previous XI:</b>` + t1XI.map(p => `<div class="card-inner live-xi">👤 ${p}</div>`).join("") +
            `<br><b style="color:var(--accent)">${t2} Previous XI:</b>` + t2XI.map(p => `<div class="card-inner live-xi">👤 ${p}</div>`).join("");

        // LOGIC: Column 5 update after Lineup[span_7](start_span)[span_7](end_span)
        // Simulation: Change to true when lineup is officially out
        const isLineupOut = true; 

        if(isLineupOut) {
            document.getElementById('wait-msg').style.display = 'none';
            generateGL([...t1XI, ...t2XI]);
        }
    }

    function generateGL(players) {
        const glDiv = document.getElementById('col-5');
        for(let i=1; i<=10; i++) {
            let shuf = [...players].sort(() => 0.5 - Math.random());
            glDiv.innerHTML += `<div class="team-box"><b>COMBINATION #${i}</b><br><span style="color:var(--gold)">C: ${shuf[0]} | VC: ${shuf[1]}</span></div>`;
        }
    }

    loadData();
</script>
</body>
</html>
