  <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #0b0f19; --card: #1e293b; --accent: #00d2ff; --gold: #facc15; --text: #f8fafc; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; }
        .header { background: #161d2f; padding: 15px; text-align: center; border-bottom: 2px solid var(--accent); }
        .tabs { display: flex; background: #161d2f; sticky; top: 0; z-index: 10; }
        .tab { flex: 1; padding: 12px; text-align: center; font-size: 14px; cursor: pointer; color: #94a3b8; border-bottom: 2px solid transparent; }
        .active-tab { color: var(--accent); border-bottom: 2px solid var(--accent); background: rgba(0,210,255,0.05); }
        .content { padding: 15px; display: none; }
        .active-content { display: block; }
        .card { background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 12px; border: 1px solid #334155; }
        .team-box { background: #0f172a; padding: 12px; border-radius: 8px; margin-bottom: 15px; border-left: 4px solid var(--gold); }
        .c-vc { font-weight: bold; color: var(--gold); margin-bottom: 5px; font-size: 14px; }
        .players { font-size: 12px; color: #cbd5e1; line-height: 1.6; }
    </style>
</head>
<body>

<div class="header">
    <h3 style="margin:0;">🔥 AUTO-EXPERT PRO v3</h3>
    <div id="status" style="font-size:10px; color:#00ff00; margin-top:5px;">● SYNCED WITH CRIC-SERVERS</div>
</div>

<div class="tabs">
    <div class="tab active-tab" onclick="showTab('score')">LIVE SCORE</div>
    <div class="tab" onclick="showTab('teams')">10 GL TEAMS</div>
</div>

<div id="score" class="content active-content">
    <div class="card">
        <h4 style="margin-top:0; color:var(--accent);">Live Match Status</h4>
        <!-- Reliable Score Widget -->
        <iframe src="https://m.cricbuzz.com/cricket-match-results" style="width:100%; height:450px; border:none; border-radius:8px;"></iframe>
    </div>
</div>

<div id="teams" class="content">
    <h4 style="color:var(--gold); margin-top:0;">🏆 Today's 10 Grand League Teams</h4>
    <div id="gl-container"></div>
</div>

<script>
    let tg = window.Telegram.WebApp;
    tg.expand();

    function showTab(name) {
        document.querySelectorAll('.content').forEach(c => c.style.display = 'none');
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active-tab'));
        document.getElementById(name).style.display = 'block';
        event.currentTarget.classList.add('active-tab');
        if(name === 'teams') renderTeams();
    }

    function renderTeams() {
        const container = document.getElementById('gl-container');
        container.innerHTML = "";
        
        // Dynamic Player Pool (Example)
        const wk = ["Ishan Kishan", "Q. de Kock"];
        const bat = ["Shubman Gill", "Suryakumar Yadav", "Travis Head", "Virat Kohli", "Sai Sudharsan"];
        const ar = ["Hardik Pandya", "Rashid Khan", "Krunal Pandya"];
        const bowl = ["Jasprit Bumrah", "Pat Cummins", "Mohit Sharma", "Noor Ahmad", "T. Natarajan"];

        for (let i = 1; i <= 10; i++) {
            let captains = [...bat, ...ar, ...bowl].sort(() => 0.5 - Math.random());
            let squad = [...wk.slice(0,1), ...bat.slice(0,3), ...ar.slice(0,2), ...bowl.slice(0,3)].sort(() => 0.5 - Math.random());
            
            let div = document.createElement('div');
            div.className = 'team-box';
            div.innerHTML = `
                <div style="font-size:12px; color:var(--accent); margin-bottom:5px;">TEAM COMBINATION #${i}</div>
                <div class="c-vc">👑 C: ${captains[0]} | 💠 VC: ${captains[1]}</div>
                <div class="players"><b>Squad:</b> ${squad.join(', ')}...</div>
            `;
            container.appendChild(div);
        }
    }
    renderTeams();
</script>

</body>
</html>
