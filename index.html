<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #0b0f19; --card: #161d2f; --accent: #00d2ff; --gold: #facc15; --text: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; overflow-x: auto; }
        .dashboard { display: flex; gap: 12px; padding: 15px; min-width: 1550px; height: 95vh; box-sizing: border-box; }
        .column { width: 290px; background: var(--card); border-radius: 12px; border: 1px solid #2d3748; display: flex; flex-direction: column; flex-shrink: 0; }
        .col-header { background: #1e293b; padding: 12px; text-align: center; border-bottom: 2px solid var(--accent); color: var(--gold); font-weight: bold; font-size: 13px; }
        .col-content { padding: 12px; overflow-y: auto; flex-grow: 1; white-space: normal; }
        .card-inner { background: #0f172a; padding: 10px; border-radius: 8px; margin-bottom: 10px; border-left: 3px solid var(--accent); font-size: 12px; }
        .prev-squad-item { border-left-color: #10b981; background: rgba(16, 185, 129, 0.05); }
        .team-box { background: #1a2236; border-left: 3px solid var(--gold); padding: 8px; margin-bottom: 8px; border-radius: 4px; font-size: 11px; }
        ::-webkit-scrollbar { height: 8px; }
        ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }
    </style>
</head>
<body>

<div class="dashboard">
    <!-- Col 1: Match Details -->
    <div class="column">
        <div class="col-header">1. MATCH INFO</div>
        <div class="col-content">
            <div class="card-inner">
                <b>TODAY: RCB vs KKR</b><br>
                📅 13 May, 2026 | 🕒 07:30 PM<br>
                📍 Raipur
            </div>
        </div>
    </div>

    <!-- Col 2: Toss & Pitch -->
    <div class="column">
        <div class="col-header">2. TOSS & PITCH</div>
        <div class="col-content">
            <div class="card-inner">
                <b>Pitch:</b> Balanced track. Spinners might get help in 2nd innings.<br><br>
                <b>Toss Status:</b> Waiting (7:00 PM)
            </div>
        </div>
    </div>

    <!-- Col 3: Master Squad Pool (Full List) -->
    <div class="column">
        <div class="col-header">3. FULL SQUAD POOL</div>
        <div class="col-content" id="master-pool"></div>
    </div>

    <!-- Col 4: Previous Match Playing XI (Both Teams) -->
    <div class="column">
        <div class="col-header" style="color:#10b981;">4. PREVIOUS SQUAD (XI)</div>
        <div class="col-content" id="previous-xi">
            <div id="team-a-prev"></div>
            <div id="team-b-prev"></div>
        </div>
    </div>

    <!-- Col 5: 10 GL Teams -->
    <div class="column">
        <div class="col-header">5. 10 MEGA GL TEAMS</div>
        <div class="col-content" id="gl-teams"></div>
    </div>
</div>

<script>
    // Master data based on your list[span_5](start_span)[span_5](end_span)
    const squads = {
        "RCB": ["Virat Kohli", "Josh Hazlewood", "Rajat Patidar", "Jitesh Sharma", "Bhuvneshwar Kumar", "Krunal Pandya", "Yash Dayal", "Anuj Rawat", "Swapnil Singh", "Glenn Maxwell"],
        "KKR": ["Rinku Singh", "Cameron Green", "Sunil Narine", "Harshit Rana", "Ramandeep Singh", "Vaibhav Arora", "Varun Chakaravarthy", "Andre Russell", "Anukul Roy", "Vaibhav Arora"]
    };

    function initDashboard() {
        const teamA = "RCB";
        const teamB = "KKR";

        // Col 3: Showing Full Master Pool[span_6](start_span)[span_6](end_span)
        const fullPool = [...squads[teamA], ...squads[teamB]];
        document.getElementById('master-pool').innerHTML = fullPool.map(p => `<div class="card-inner">${p}</div>`).join("");

        // Col 4: Showing Previous Squad (XI) for BOTH Teams[span_7](start_span)[span_7](end_span)
        const teamAPrev = squads[teamA].slice(0, 11);
        const teamBPrev = squads[teamB].slice(0, 11);

        document.getElementById('team-a-prev').innerHTML = `<b style="color:var(--accent)">${teamA} Prev XI:</b><br>` + 
            teamAPrev.map(p => `<div class="card-inner prev-squad-item">👤 ${p}</div>`).join("");
        
        document.getElementById('team-b-prev').innerHTML = `<br><b style="color:var(--accent)">${teamB} Prev XI:</b><br>` + 
            teamBPrev.map(p => `<div class="card-inner prev-squad-item">👤 ${p}</div>`).join("");

        // Col 5: Generate Teams from Column 4 Data[span_8](start_span)[span_8](end_span)
        generateGL([...teamAPrev, ...teamBPrev]);
    }

    function generateGL(players) {
        const glDiv = document.getElementById('gl-teams');
        glDiv.innerHTML = "";
        for(let i=1; i<=10; i++) {
            let shuf = [...players].sort(() => 0.5 - Math.random());
            glDiv.innerHTML += `
                <div class="team-box">
                    <b>COMBINATION #${i}</b><br>
                    <span style="color:var(--gold)">C: ${shuf[0]} | VC: ${shuf[1]}</span>
                </div>`;
        }
    }

    initDashboard();
</script>
</body>
</html>
