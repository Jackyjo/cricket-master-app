<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #0b0f19; --card: #161d2f; --accent: #00d2ff; --gold: #facc15; --text: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; overflow-x: auto; }
        .app-container { display: flex; gap: 12px; padding: 15px; min-width: 1500px; height: 90vh; }
        .column { flex: 0 0 280px; background: var(--card); border-radius: 12px; border: 1px solid #2d3748; display: flex; flex-direction: column; }
        .col-header { background: #1e293b; padding: 12px; border-radius: 12px 12px 0 0; border-bottom: 2px solid var(--accent); text-align: center; font-weight: bold; font-size: 13px; color: var(--gold); }
        .col-content { padding: 10px; overflow-y: auto; flex-grow: 1; font-size: 12px; }
        .card-inner { background: #0f172a; padding: 10px; border-radius: 8px; margin-bottom: 10px; border-left: 3px solid var(--accent); }
        .player-tag { display: inline-block; background: #334155; padding: 2px 6px; border-radius: 4px; margin: 2px; font-size: 11px; }
        .playing-xi { border-left-color: #10b981; }
        .team-box { border-left: 3px solid #ef4444; background: #1a2236; padding: 8px; margin-bottom: 8px; border-radius: 4px; }
        ::-webkit-scrollbar { height: 8px; }
        ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }
    </style>
</head>
<body>

<div class="app-container">
    
    <!-- Col 1: Match Info -->
    <div class="column">
        <div class="col-header">1. MATCH DETAILS</div>
        <div class="col-content">
            <div class="card-inner">
                <b id="match-title">Loading...</b><br>
                <p id="venue">Eden Gardens, Kolkata</p>
                <p id="time">07:30 PM IST</p>
            </div>
        </div>
    </div>

    <!-- Col 2: Toss & Pitch -->
    <div class="column">
        <div class="col-header">2. TOSS & PITCH</div>
        <div class="col-content">
            <div class="card-inner">
                <b>Pitch:</b> Balanced<br>
                <b>Toss:</b> KKR won & elected to BAT
            </div>
        </div>
    </div>

    <!-- Col 3: Previous Squad (Historical Data) -->
    <div class="column">
        <div class="col-header">3. PREVIOUS SQUAD</div>
        <div class="col-content" id="prev-squad">
            <p style="font-size:10px; color:#94a3b8;">Fetching historical data...</p>
        </div>
    </div>

    <!-- Col 4: Live Lineup (From Master List) -->
    <div class="column">
        <div class="col-header" style="color:#10b981;">4. LIVE LINEUP</div>
        <div class="col-content" id="live-lineup">
            <p>Waiting for Toss...</p>
        </div>
    </div>

    <!-- Col 5: 10 GL Teams -->
    <div class="column">
        <div class="col-header">5. 10 MEGA GL TEAMS</div>
        <div class="col-content" id="gl-teams">
            <p>Analyzing Final XI...</p>
        </div>
    </div>

</div>

<script>
    // Master Database from your list[span_4](start_span)[span_4](end_span)
    const masterData = {
        "KKR": ["Rinku Singh", "Sunil Narine", "Varun Chakaravarthy", "Harshit Rana", "Ramandeep Singh", "Vaibhav Arora", "Cameron Green", "Manish Pandey"],
        "SRH": ["Pat Cummins", "Heinrich Klaasen", "Abhishek Sharma", "Travis Head", "Nitish Kumar Reddy", "Ishan Kishan", "Shahbaz Ahmed", "T. Natarajan"],
        "MI": ["Jasprit Bumrah", "Hardik Pandya", "Suryakumar Yadav", "Rohit Sharma", "Tilak Varma", "Mitchell Starc", "Naman Dhir"]
    };

    function startApp() {
        // 1. Fixing Teams (Assume KKR vs SRH)
        const teamA = "KKR";
        const teamB = "SRH";
        document.getElementById('match-title').innerText = teamA + " vs " + teamB;

        // 2. Col 3: Showing Previous Squad
        const prevSquad = [...masterData[teamA], ...masterData[teamB]];
        document.getElementById('prev-squad').innerHTML = prevSquad.map(p => `<span class="player-tag">${p}</span>`).join("");

        // 3. Col 4: Simulating Lineup Logic (Filter from Master)
        // Match ke waqt yahan sirf 11 players filter honge
        const finalXI = [...masterData[teamA].slice(0,6), ...masterData[teamB].slice(0,5)];
        document.getElementById('live-lineup').innerHTML = finalXI.map(p => `<div class="card-inner playing-xi">✅ ${p}</div>`).join("");

        // 4. Col 5: Generating GL Teams
        generateGL(finalXI);
    }

    function generateGL(players) {
        const container = document.getElementById('gl-teams');
        container.innerHTML = "";
        for(let i=1; i<=10; i++) {
            let shuf = [...players].sort(() => 0.5 - Math.random());
            container.innerHTML += `<div class="team-box"><b>TEAM #${i}</b><br><span style="color:var(--gold)">C: ${shuf[0]} | VC: ${shuf[1]}</span></div>`;
        }
    }

    startApp();
</script>
</body>
</html>
